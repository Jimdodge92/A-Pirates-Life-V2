<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plunder: A Pirate's Life</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }
        #splash-container {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        #splash-container img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        .button-group {
            position: absolute; bottom: 10%;
            display: flex; gap: 1rem;
        }
        /* Design matching your Menu button screenshot */
        .splash-btn {
            background-color: transparent;
            color: #98FF98;
            padding: 0.5rem 1.5rem;
            border-radius: 0.75rem;
            font-family: sans-serif;
            font-size: 1.5rem;
            cursor: pointer;
            border: 2px solid #98FF98;
            transition: all 0.2s ease;
        }
        .splash-btn:hover {
            background-color: rgba(152, 255, 152, 0.1);
        }
    </style>
</head>
<body>

    <div id="splash-container">
        <img src="image_ec0c56.jpg" alt="Splash Screen">
        <div class="button-group">
            <button class="splash-btn" onclick="window.location.href='app.html'">Simple</button>
            <button class="splash-btn" onclick="alert('Advanced Coming Soon')">Advanced</button>
        </div>
    </div>

</body>
</html>
