<div id="main-content">
    <div class="title-wrapper">
        <img src="TitleScreen.jpg" alt="Plunder, A Pirate's Life" class="w-full">
        <div class="button-overlay">
            <button class="splash-button" onclick="loadApp()">Simple</button>
            <button class="splash-button">Advanced</button>
        </div>
    </div>
</div>

<script>
    async function loadApp() {
        try {
            const response = await fetch('app.html');
            const html = await response.text();
            
            // This extracts the body content of app.html and replaces the current screen
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            document.getElementById('main-content').innerHTML = doc.body.innerHTML;
            
            // Re-run any original scripts if necessary
            // Note: Since you're loading a whole new body, you may need to 
            // re-initialize your original JS here if it's not self-executing.
        } catch (error) {
            console.error("Error loading app:", error);
        }
    }
</script>
