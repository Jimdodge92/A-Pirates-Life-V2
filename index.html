<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plunder, A Pirate's Life</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Inter", sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .title-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
        }
        .button-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        .game-container {
            background-color: #d4b88c;
            border-radius: 1.5rem;
            padding: 2.5rem;
            text-align: center;
            width: 550px;
            border: 5px solid #8b4513;
        }
        /* Updated Semi-Transparent Button Styling */
        .generate-button {
            background-color: rgba(0, 0, 0, 0.75); /* 75% opacity */
            color: #98FF98;
            padding: 0.5rem 1.5rem;
            border-radius: 0.75rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            cursor: pointer;
            border: 4px solid #4A6741; /* Thicker border */
            transition: all 0.2s ease;
            width: auto;
            min-width: 180px;
        }
        .generate-button:hover {
            background-color: rgba(0, 0, 0, 0.9);
            border-color: #98FF98;
        }
        .display-section {
            background-color: #fdf6e3;
            border-radius: 0.75rem;
            padding: 1.25rem;
            border: 2px solid #8b4513;
        }
    </style>
</head>
<body>

    <div id="titleView" class="title-wrapper">
        <img src="TitleScreen.jpg" alt="Plunder, A Pirate's Life" class="w-full">
        <div class="button-overlay">
            <button id="btnSimple" class="generate-button">Simple</button>
            <button id="btnAdvanced" class="generate-button">Advanced</button>
        </div>
    </div>

    <div id="simpleView" class="game-container hidden">
        <h1 class="text-3xl font-bold mb-4">Plunder Utility</h1>
        <button class="mb-4 text-amber-900 font-bold" onclick="showTitleView()">Return to Menu</button>
    </div>

    <div id="advancedView" class="game-container hidden">
        <h1 class="text-3xl font-bold mb-4">Board Setup</h1>
        <button class="mb-4 text-amber-900 font-bold" onclick="showTitleView()">Return to Menu</button>
        <p>Advanced map generation here.</p>
    </div>

    <script>
        const titleView = document.getElementById('titleView');
        const simpleView = document.getElementById('simpleView');
        const advancedView = document.getElementById('advancedView');
        const btnSimple = document.getElementById('btnSimple');
        const btnAdvanced = document.getElementById('btnAdvanced');

        function showTitleView() {
            titleView.classList.remove('hidden');
            simpleView.classList.add('hidden');
            advancedView.classList.add('hidden');
        }

        function showSimpleView() {
            titleView.classList.add('hidden');
            simpleView.classList.remove('hidden');
            advancedView.classList.add('hidden');
        }

        function showAdvancedView() {
            titleView.classList.add('hidden');
            simpleView.classList.add('hidden');
            advancedView.classList.remove('hidden');
        }

        btnSimple.addEventListener('click', showSimpleView);
        btnAdvanced.addEventListener('click', showAdvancedView);
    </script>
</body>
</html>
