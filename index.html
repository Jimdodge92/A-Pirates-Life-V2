<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plunder: A Pirate's Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .wrapper { 
            position: relative; 
            display: inline-block; 
            max-width: 600px;
        }

        .splash-image { width: 100%; height: auto; display: block; }

        .button-group { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; gap: 10px;
        }

        .splash-btn {
            background-color: rgba(0, 0, 0, 0.75);
            color: #98FF98;
            padding: 0.5rem 1.5rem;
            border-radius: 0.75rem;
            /* Updated to Pirata One */
            font-family: 'Pirata One', cursive;
            font-size: 1.8rem;
            cursor: pointer;
            border: 4px solid #4A6741;
            transition: all 0.2s ease;
            min-width: 180px;
        }
        .splash-btn:hover { background-color: rgba(0, 0, 0, 0.9); border-color: #98FF98; }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="TitleScreen.jpg" alt="Title Screen" class="splash-image">
        
        <div class="button-group">
            <button class="splash-btn" onclick="window.location.href='app.html'">Simple</button>
            <button class="splash-btn" onclick="alert('Advanced Coming Soon')">Advanced</button>
        </div>
    </div>

</body>
</html>
