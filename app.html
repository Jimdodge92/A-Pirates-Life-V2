<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plunder, A Pirate's Life</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Inter", sans-serif;
            background: #1a2a3a url('BackDrop.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
        }
        .container {
            background-color: rgba(212, 184, 140, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            padding: 1.5rem;
            text-align: center;
            max-width: 90%;
            width: 550px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border: 5px solid #93E9BE;
            position: relative;
        }

        /* Compass Graphic Styles */
        .compass-section { display: flex; flex-direction: column; align-items: center; }
        .compass-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }
        .compass-base {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .compass-needle {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('Needle - RM.png') no-repeat center center;
            background-size: contain;
            transition: transform 2s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        h1 { font-family: 'Pirata One', cursive; font-size: 3rem; color: #ffffff; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); }
        .hidden { display: none; }
        .generate-button {
            background-image: linear-gradient(to right, #4e342e, #6d4c41);
            color: #ffd700; padding: 1rem 2rem; border-radius: 1rem;
            border: 3px solid #b8860b; cursor: pointer;
        }
        select { background-color: rgba(253, 246, 227, 0.8); border: 2px solid #93E9BE; color: #000; padding: 0.5rem; border-radius: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Plunder, A Pirate's Life</h1>

        <div class="selector-item">
            <label style="color: #93E9BE;">Alphabet Tiles:</label>
            <select id="alphabetTilesSelector">
                <option value="1">1 Tile (A-F)</option>
                <option value="2">2 Tiles (A-L)</option>
            </select>
        </div>

        <!-- Compass Display Area -->
        <div id="compassSection" class="compass-section">
            <div class="compass-wrapper">
                <div id="compassBase" class="compass-base"></div>
                <div id="needle" class="compass-needle"></div>
            </div>
            <button id="spinButton" class="generate-button" style="margin-top: 1rem;">Spin Compass</button>
        </div>
    </div>

    <script>
        const alphabetSelector = document.getElementById('alphabetTilesSelector');
        const compassSection = document.getElementById('compassSection');
        const compassBase = document.getElementById('compassBase');
        const needle = document.getElementById('needle');
        const spinButton = document.getElementById('spinButton');

        function updateCompassDisplay() {
            const tiles = alphabetSelector.value;
            
            if (tiles === '1') {
                compassSection.classList.remove('hidden');
                compassBase.style.backgroundImage = "url('Compass_A-F.png')";
            } else if (tiles === '2') {
                compassSection.classList.remove('hidden');
                compassBase.style.backgroundImage = "url('Compass_A-L.png')";
            } else {
                compassSection.classList.add('hidden');
            }
        }

        spinButton.addEventListener('click', () => {
            const tiles = alphabetSelector.value;
            const segments = tiles === '1' ? 6 : 12;
            const degreesPerSegment = 360 / segments;
            
            const randomIndex = Math.floor(Math.random() * segments);
            const angle = randomIndex * degreesPerSegment;
            
            needle.style.transform = `rotate(${angle + (360 * 3)}deg)`;
            spinButton.disabled = true;
            setTimeout(() => spinButton.disabled = false, 2000);
        });

        alphabetSelector.addEventListener('change', updateCompassDisplay);
        window.onload = updateCompassDisplay;
    </script>
</body>
</html>
