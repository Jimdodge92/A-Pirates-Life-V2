<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plunder, A Pirate's Life</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; background: #1a2a3a url('BackDrop.jpg') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem; box-sizing: border-box; }
        .container { background-color: rgba(212, 184, 140, 0.1); border-radius: 1.5rem; box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4); padding: 1.5rem; text-align: center; max-width: 90%; width: 550px; display: flex; flex-direction: column; gap: 1.5rem; border: 5px solid #93E9BE; position: relative; }
        @media (min-width: 640px) { .container { padding: 2.5rem; } }
        .container::before { content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border: 5px dashed rgba(147, 233, 190, 0.5); border-radius: 1.5rem; pointer-events: none; }
        h1 { font-family: 'Pirata One', cursive; font-size: 2.8rem; color: #ffffff; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); margin-bottom: 1.5rem; line-height: 1.1; }
        .display-section { background-color: rgba(253, 246, 227, 0.2); border-radius: 0.75rem; padding: 1.25rem; font-weight: 700; color: #ffffff; display: flex; justify-content: center; align-items: center; flex-direction: column; border: 2px solid #93E9BE; box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1); }
        .display-title { font-size: 1.5rem; color: #93E9BE; margin-bottom: 0.5rem; font-family: 'Pirata One', cursive; }
        
        /* Compass Styles */
        .compass-wrapper { position: relative; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; }
        .compass-base { width: 120px; height: 120px; background: url('Compass_A-F.png') no-repeat center center; background-size: contain; }
        .compass-needle { position: absolute; width: 120px; height: 120px; background: url('Needle - RM.png') no-repeat center center; background-size: contain; transition: transform 2s cubic-bezier(0.2, 0.8, 0.3, 1); }
        .compass-dial { font-size: 3.5rem; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        
        .button-group { display: flex; flex-direction: column; gap: 1rem; }
        @media (min-width: 640px) { .button-group { flex-direction: row; } }
        .generate-button { flex: 1; background-image: linear-gradient(to right, #4e342e, #6d4c41); color: #ffd700; padding: 1.2rem; border-radius: 1rem; font-size: 1.35rem; cursor: pointer; border: 3px solid #b8860b; }
        .selector-group { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; }
        select { background-color: rgba(253, 246, 227, 0.8); border: 2px solid #93E9BE; padding: 0.5rem; color: #000; border-radius: 0.5rem; }
        .checkbox-group { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Plunder, A Pirate's Life</h1>
        <div class="checkbox-group">
            <label><input type="checkbox" id="resourceCheckbox"> Booty Draw</label>
            <label><input type="checkbox" id="battleCheckbox"> Skirmish</label>
        </div>
        <div class="selector-group">
            <div><label>Alphabet:</label><br><select id="alphabetTilesSelector"></select></div>
            <div><label>Numbers:</label><br><select id="numberTilesSelector"></select></div>
        </div>
        <div class="display-section">
            <div class="display-title">Cast your luck!</div>
            <!-- Standard Text Dials -->
            <div id="textDials" class="flex gap-4">
                <div id="letterDial" class="compass-dial">A</div>
                <div id="numberDial" class="compass-dial">1</div>
            </div>
            <!-- Compass Graphic (Hidden by default) -->
            <div id="compassVisual" class="hidden">
                <div class="compass-wrapper">
                    <div class="compass-base"></div>
                    <div id="needle" class="compass-needle"></div>
                </div>
            </div>
        </div>
        <div id="resourceSection" class="display-section hidden"><div class="display-title">Resource</div><div id="resourceDisplay">Draw your bounty!</div></div>
        <div id="attackSection" class="display-section hidden"><div class="display-title">Battle Roll</div><div id="attackDisplay">Prepare to board!</div></div>
        <div class="button-group">
            <button id="spinDialButton" class="generate-button">Spin Dial</button>
            <button id="drawResourceButton" class="generate-button hidden">Draw Card</button>
            <button id="attackButton" class="generate-button hidden">Attack!</button>
        </div>
        <audio id="wilhelmScreamAudio" src="wilhelm_scream.mp3"></audio>
        <audio id="cannonFireAudio" src="Canon_Fire.mp3"></audio>
    </div>

    <script>
        const alphaSel = document.getElementById('alphabetTilesSelector'), numSel = document.getElementById('numberTilesSelector');
        const textDials = document.getElementById('textDials'), compassVisual = document.getElementById('compassVisual');
        const needle = document.getElementById('needle'), letterDial = document.getElementById('letterDial'), numberDial = document.getElementById('numberDial');
        
        for(let i=1; i<=10; i++) alphaSel.innerHTML += `<option value="${i}">${i} Tiles</option>`;
        for(let i=1; i<=12; i++) numSel.innerHTML += `<option value="${i}">${i} Tiles</option>`;

        function updateUI() {
            if (alphaSel.value === '1') {
                textDials.classList.add('hidden');
                compassVisual.classList.remove('hidden');
            } else {
                textDials.classList.remove('hidden');
                compassVisual.classList.add('hidden');
            }
        }

        document.getElementById('spinDialButton').onclick = () => {
            if (alphaSel.value === '1') {
                const angle = Math.floor(Math.random() * 6) * 60;
                needle.style.transform = `rotate(${angle + 1080}deg)`;
            } else {
                letterDial.textContent = String.fromCharCode(65 + Math.floor(Math.random() * (alphaSel.value * 6)));
            }
            numberDial.textContent = Math.floor(Math.random() * (numSel.value * 6)) + 1;
        };

        document.getElementById('resourceCheckbox').onchange = (e) => {
            document.getElementById('resourceSection').classList.toggle('hidden', !e.target.checked);
            document.getElementById('drawResourceButton').classList.toggle('hidden', !e.target.checked);
        };
        document.getElementById('battleCheckbox').onchange = (e) => {
            document.getElementById('attackSection').classList.toggle('hidden', !e.target.checked);
            document.getElementById('attackButton').classList.toggle('hidden', !e.target.checked);
        };

        document.getElementById('drawResourceButton').onclick = () => {
            const res = ['Wood', 'Rum', 'Iron', 'Gold'];
            document.getElementById('resourceDisplay').innerHTML = `<span class="resource-item">${res[Math.floor(Math.random()*res.length)]}</span>`;
        };

        document.getElementById('attackButton').onclick = () => {
            document.getElementById('cannonFireAudio').play();
            setTimeout(() => {
                const atk = Math.floor(Math.random()*6)+1, def = Math.floor(Math.random()*6)+1;
                document.getElementById('attackDisplay').innerHTML = `Rolls: ${atk} vs ${def} <br> ${atk >= def ? 'Attacker Wins!' : 'Defender Wins!'}`;
                document.getElementById('wilhelmScreamAudio').play();
            }, 1000);
        };

        alphaSel.onchange = updateUI;
    </script>
</body>
</html>
